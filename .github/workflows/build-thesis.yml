name: Build thesis PDF

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    name: Compile LaTeX thesis
    runs-on: ubuntu-latest

    env:
      LATEX_IMAGE: texlive/texlive:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: First LaTeX pass
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "$LATEX_IMAGE" \
            pdflatex -interaction=nonstopmode -halt-on-error main.tex

      - name: BibTeX pass when citations exist
        run: |
          if grep -q '^\\citation' main.aux; then
            docker run --rm \
              -v "${{ github.workspace }}:/work" \
              -w /work \
              "$LATEX_IMAGE" \
              bibtex main
          else
            echo "No citations found in main.aux; skipping bibtex."
          fi

      - name: Final LaTeX passes
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "$LATEX_IMAGE" \
            pdflatex -interaction=nonstopmode -halt-on-error main.tex

          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "$LATEX_IMAGE" \
            pdflatex -interaction=nonstopmode -halt-on-error main.tex

      - name: Upload PDF and log
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: |
            main.pdf
            main.log
          if-no-files-found: error

      - name: Commit and push compiled PDF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'Update compiled thesis PDF [skip ci]'
          file_pattern: 'main.pdf'
          branch: main

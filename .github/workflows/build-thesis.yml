name: Check thesis source

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-checks:
    name: Static source checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required project files
        run: |
          test -f main.tex
          test -f references.bib
          test -f build-pdf.ps1
          test -f BUILD.md
          test -f Robotics-Software-State-of-Practice.pdf

      - name: Check included TeX files exist
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          main = root / "main.tex"
          pattern = re.compile(r"\\(?:include|input)\{([^}]+)\}")
          missing = []

          for line in main.read_text(encoding="utf-8").splitlines():
              source = line.split("%", 1)[0]
              for match in pattern.finditer(source):
                  target = match.group(1)
                  path = root / (target if target.endswith(".tex") else f"{target}.tex")
                  if not path.exists():
                      missing.append(str(path))

          if missing:
              print("Missing TeX files referenced from main.tex:")
              for path in missing:
                  print(f"  - {path}")
              sys.exit(1)

          print("All active include/input TeX files exist.")
          PY

      - name: Check for merge conflict markers
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- '*.tex' '*.bib' '*.md' '*.ps1' '.github/workflows/*.yml'; then
            echo "Merge conflict markers found."
            exit 1
          fi

      - name: Check named PDF build configuration
        run: |
          if ! grep -q 'Robotics-Software-State-of-Practice.pdf' BUILD.md; then
            echo "BUILD.md does not document the named report PDF."
            exit 1
          fi
          if ! grep -q 'Robotics-Software-State-of-Practice' build-pdf.ps1; then
            echo "build-pdf.ps1 does not use the named report output."
            exit 1
          fi

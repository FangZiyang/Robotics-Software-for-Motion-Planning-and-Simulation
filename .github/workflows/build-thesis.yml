name: Build report PDF

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    name: Compile LaTeX report
    runs-on: ubuntu-latest

    env:
      LATEX_IMAGE: texlive/texlive:latest
      MAIN_BASENAME: main
      FINAL_BASENAME: Robotics-Software-State-of-Practice

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: First LaTeX pass
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "$LATEX_IMAGE" \
            pdflatex -interaction=nonstopmode -halt-on-error "$MAIN_BASENAME.tex"

      - name: BibTeX pass when citations exist
        run: |
          if grep -q '^\\citation' "$MAIN_BASENAME.aux"; then
            docker run --rm \
              -v "${{ github.workspace }}:/work" \
              -w /work \
              "$LATEX_IMAGE" \
              bibtex "$MAIN_BASENAME"
          else
            echo "No citations found in $MAIN_BASENAME.aux; skipping bibtex."
          fi

      - name: Final LaTeX passes
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "$LATEX_IMAGE" \
            pdflatex -interaction=nonstopmode -halt-on-error "$MAIN_BASENAME.tex"

          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            "$LATEX_IMAGE" \
            pdflatex -interaction=nonstopmode -halt-on-error "$MAIN_BASENAME.tex"

      - name: Check for undefined citations
        run: |
          echo "Checking $MAIN_BASENAME.log for undefined citation warnings..."
          if grep -E 'Citation .+ undefined' "$MAIN_BASENAME.log"; then
            echo ""
            echo "ERROR: One or more citations are unresolved (shown as '?' in PDF)."
            echo "Fix the \\cite{} keys or add the missing entries to your .bib file."
            exit 1
          fi
          echo "All citations resolved."

      - name: Check for undefined references
        run: |
          echo "Checking $MAIN_BASENAME.log for undefined reference warnings..."
          if grep -E 'Reference .+ undefined' "$MAIN_BASENAME.log"; then
            echo ""
            echo "ERROR: One or more cross-references are unresolved (shown as '?' in PDF)."
            echo "Fix the \\ref{} / \\eqref{} keys or ensure the referenced labels exist."
            exit 1
          fi
          echo "All references resolved."

      - name: Rename combined PDF
        run: cp "$MAIN_BASENAME.pdf" "$FINAL_BASENAME.pdf"

      - name: Upload PDF and log
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: |
            ${{ env.FINAL_BASENAME }}.pdf
            ${{ env.MAIN_BASENAME }}.log
          if-no-files-found: error

      - name: Commit and push compiled PDF
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Update compiled report PDF [skip ci]'
          file_pattern: ${{ env.FINAL_BASENAME }}.pdf
          branch: main
